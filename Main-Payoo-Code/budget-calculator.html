<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Budget Calculator</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }

      .no-spinner {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .no-spinner::-webkit-outer-spin-button,
      .no-spinner::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
    </style>
  </head>

  <body class="min-h-screen max-w-md bg-base-200 mx-auto relative">
    <div
      id="toast-container"
      class="fixed top-4 right-4 z-50 max-w-sm w-full space-y-2"
    ></div>

    <header
      class="border-b-2 border-gray-300 sticky top-0 bg-base-200/95 backdrop-blur-sm z-10"
    >
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="flex gap-2 items-center">
          <a href="home.html" class="btn btn-ghost btn-sm btn-circle">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
          <div class="logo w-[40px]">
            <img src="assets/logo.png" alt="Payoo Logo" />
          </div>
        </div>
      </section>
    </header>

    <section class="w-11/12 mx-auto py-6">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-calculator text-info"></i>
        Budget Calculator
      </h2>

      <div class="space-y-4">
        <!-- Income Input -->
        <div class="card bg-base-100 shadow rounded-2xl">
          <div class="card-body">
            <h3 class="font-bold mb-3">Monthly Income</h3>
            <input
              id="monthly-income"
              type="number"
              class="input rounded-full bg-base-200 w-full no-spinner"
              placeholder="Enter monthly income"
            />
          </div>
        </div>

        <!-- Expense Categories -->
        <div class="card bg-base-100 shadow rounded-2xl">
          <div class="card-body">
            <h3 class="font-bold mb-3">Expenses</h3>
            <div class="space-y-3">
              <div>
                <label class="text-sm">Housing</label>
                <input
                  id="expense-housing"
                  type="number"
                  class="input rounded-full bg-base-200 w-full no-spinner"
                  placeholder="Rent/Mortgage"
                />
              </div>
              <div>
                <label class="text-sm">Food</label>
                <input
                  id="expense-food"
                  type="number"
                  class="input rounded-full bg-base-200 w-full no-spinner"
                  placeholder="Groceries & Dining"
                />
              </div>
              <div>
                <label class="text-sm">Transport</label>
                <input
                  id="expense-transport"
                  type="number"
                  class="input rounded-full bg-base-200 w-full no-spinner"
                  placeholder="Fuel/Transit"
                />
              </div>
              <div>
                <label class="text-sm">Utilities</label>
                <input
                  id="expense-utilities"
                  type="number"
                  class="input rounded-full bg-base-200 w-full no-spinner"
                  placeholder="Bills"
                />
              </div>
              <button
                id="calculate-btn"
                class="btn btn-info rounded-full w-full"
              >
                <i class="fa-solid fa-calculator"></i> Calculate Budget
              </button>
            </div>
          </div>
        </div>

        <!-- Results -->
        <div
          id="budget-results"
          class="card bg-base-100 shadow rounded-2xl hidden"
        >
          <div class="card-body">
            <h3 class="font-bold mb-3">Budget Summary</h3>
            <div id="budget-summary" class="space-y-2"></div>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="script/pages/budget-calculator.js"></script>
  </body>
</html>
