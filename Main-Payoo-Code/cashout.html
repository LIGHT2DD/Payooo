<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Cashout</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <script>
      try {
        const savedTheme = localStorage.getItem("payoo_theme");
        if (savedTheme === "dark" || savedTheme === "light") {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }
      } catch (error) {
        console.warn("Theme load failed:", error);
      }
    </script>

    <!-- tailwind+daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }

      .input-error {
        border-color: #ef4444 !important;
        animation: shake 0.3s ease-in-out;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: fade-in 0.3s ease-out;
      }

      /* Button press effect - soft blue */
      .btn:active,
      button:active {
        background-color: rgb(59, 130, 246) !important;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2) !important;
        transform: scale(0.98);
      }

      /* Dark mode text contrast */
      [data-theme="dark"] body,
      [data-theme="dark"] .text-neutral,
      [data-theme="dark"] .text-neutral\/50,
      [data-theme="dark"] .text-neutral\/60,
      [data-theme="dark"] .text-neutral\/70,
      [data-theme="dark"] p {
        color: rgba(255, 255, 255, 0.95) !important;
      }
    </style>
      <link rel="stylesheet" href="assets/responsive.css" />
</head>

  <body class="min-h-screen max-w-md bg-base-200 mx-auto relative">
    <div id="app-shell"></div>
    <!-- Toast Container -->
    <div
      id="toast-container"
      class="fixed top-4 right-4 z-50 max-w-sm w-full space-y-2"
    ></div>

    <!-- Header -->
    <header
      class="border-b-2 border-gray-300 sticky top-0 bg-base-200/95 backdrop-blur-sm z-10"
    >
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="flex gap-2 items-center">
          <a href="home.html" class="btn btn-ghost btn-sm btn-circle">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
          <div class="logo w-[40px]">
            <img src="assets/logo.png" alt="Payoo Logo" />
          </div>
          <div class="balance-info">
            <h2 class="text-xl font-bold">$<span id="balance">0.00</span></h2>
            <p class="text-neutral/50 text-xs">Available Balance</p>
          </div>
        </div>
      </section>
    </header>

    <!-- Cashout Form -->
    <section class="w-11/12 mx-auto py-6">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-arrow-up-from-bracket text-primary"></i>
        Cashout
      </h2>
      <div class="card bg-base-100 w-full shadow rounded-2xl">
        <div class="card-body">
          <fieldset class="fieldset space-y-3">
            <label class="label text-neutral font-bold">Agent Number</label>
            <input
              id="cashout-number"
              maxlength="11"
              minlength="11"
              type="tel"
              class="input rounded-full bg-base-200 w-full"
              value="01234567890"
              placeholder="Enter Agent 11 digit Number"
            />

            <label class="label text-neutral font-bold">Amount</label>
            <input
              id="cashout-amount"
              type="text"
              inputmode="decimal"
              pattern="[0-9]*[.]?[0-9]*"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter Amount to withdraw"
            />

            <label class="label text-neutral font-bold">4 Digit Pin</label>
            <input
              id="cashout-pin"
              type="password"
              maxlength="4"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter 4 Digit Pin"
            />

            <button
              id="cashout-btn"
              class="btn btn-primary mt-4 rounded-full transaction-btn w-full"
            >
              <i class="fa-solid fa-arrow-up-from-bracket"></i>
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <script type="module" src="script/desktop-shell.js"></script>
    <script type="module" src="script/pages/cashout.js"></script>
  </body>
</html>
