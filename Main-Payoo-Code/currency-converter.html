<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Currency Converter</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <script>
      try {
        const savedTheme = localStorage.getItem("payoo_theme");
        if (savedTheme === "dark" || savedTheme === "light") {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }
      } catch (error) {
        console.warn("Theme load failed:", error);
      }
    </script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }

      .no-spinner {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .no-spinner::-webkit-outer-spin-button,
      .no-spinner::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      /* Button press effect - soft blue */
      .btn:active,
      button:active {
        background-color: rgb(59, 130, 246) !important;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2) !important;
        transform: scale(0.98);
      }

      /* Dark mode text contrast */
      [data-theme="dark"] body,
      [data-theme="dark"] .text-neutral,
      [data-theme="dark"] .text-neutral\/50,
      [data-theme="dark"] .text-neutral\/60,
      [data-theme="dark"] .text-neutral\/70,
      [data-theme="dark"] p {
        color: rgba(255, 255, 255, 0.95) !important;
      }
    </style>
      <link rel="stylesheet" href="assets/responsive.css" />
</head>

  <body class="min-h-screen max-w-md bg-base-200 mx-auto relative">
    <div id="app-shell"></div>
    <div
      id="toast-container"
      class="fixed top-4 right-4 z-50 max-w-sm w-full space-y-2"
    ></div>

    <header
      class="border-b-2 border-gray-300 sticky top-0 bg-base-200/95 backdrop-blur-sm z-10"
    >
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="flex gap-2 items-center">
          <a href="home.html" class="btn btn-ghost btn-sm btn-circle">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
          <div class="logo w-[40px]">
            <img src="assets/logo.png" alt="Payoo Logo" />
          </div>
          <div class="balance-info">
            <h2 class="text-xl font-bold">$<span id="balance">0.00</span></h2>
            <p class="text-neutral/50 text-xs">Available Balance</p>
          </div>
        </div>
      </section>
    </header>

    <section class="w-11/12 mx-auto py-6">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-money-bill-transfer text-warning"></i>
        Currency Converter
      </h2>

      <div class="space-y-4">
        <div class="card bg-base-100 shadow rounded-2xl">
          <div class="card-body">
            <div class="space-y-3">
              <div>
                <label class="text-sm font-bold">Amount</label>
                <input
                  id="convert-amount"
                  type="number"
                  class="input rounded-full bg-base-200 w-full no-spinner"
                  placeholder="Enter amount"
                  value="1"
                />
              </div>
              <div>
                <label class="text-sm font-bold">From</label>
                <select
                  id="from-currency"
                  class="select w-full bg-base-200 rounded-full"
                >
                  <option value="USD">USD - US Dollar</option>
                  <option value="EUR">EUR - Euro</option>
                  <option value="GBP">GBP - British Pound</option>
                  <option value="BDT">BDT - Bangladeshi Taka</option>
                  <option value="INR">INR - Indian Rupee</option>
                  <option value="JPY">JPY - Japanese Yen</option>
                </select>
              </div>
              <div>
                <label class="text-sm font-bold">To</label>
                <select
                  id="to-currency"
                  class="select w-full bg-base-200 rounded-full"
                >
                  <option value="BDT">BDT - Bangladeshi Taka</option>
                  <option value="USD">USD - US Dollar</option>
                  <option value="EUR">EUR - Euro</option>
                  <option value="GBP">GBP - British Pound</option>
                  <option value="INR">INR - Indian Rupee</option>
                  <option value="JPY">JPY - Japanese Yen</option>
                </select>
              </div>
              <button
                id="convert-btn"
                class="btn btn-warning rounded-full w-full"
              >
                <i class="fa-solid fa-rotate"></i> Convert
              </button>
            </div>
          </div>
        </div>

        <!-- Result -->
        <div
          id="conversion-result"
          class="card bg-base-100 shadow rounded-2xl hidden"
        >
          <div class="card-body text-center">
            <h3 class="font-bold text-lg">Converted Amount</h3>
            <p id="result-display" class="text-3xl font-bold text-warning"></p>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="script/desktop-shell.js"></script>
    <script type="module" src="script/pages/currency-converter.js"></script>
  </body>
</html>
