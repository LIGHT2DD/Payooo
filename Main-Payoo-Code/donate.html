<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Donate</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <script>
      try {
        const savedTheme = localStorage.getItem("payoo_theme");
        if (savedTheme === "dark" || savedTheme === "light") {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }
      } catch (error) {
        console.warn("Theme load failed:", error);
      }
    </script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }

      .no-spinner {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .no-spinner::-webkit-outer-spin-button,
      .no-spinner::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      /* Button press effect - soft blue */
      .btn:active,
      button:active {
        background-color: rgb(59, 130, 246) !important;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2) !important;
        transform: scale(0.98);
      }

      /* Dark mode text contrast */
      [data-theme="dark"] body,
      [data-theme="dark"] .text-neutral,
      [data-theme="dark"] .text-neutral\/50,
      [data-theme="dark"] .text-neutral\/60,
      [data-theme="dark"] .text-neutral\/70,
      [data-theme="dark"] p {
        color: rgba(255, 255, 255, 0.95) !important;
      }
    </style>
  </head>

  <body class="min-h-screen max-w-md bg-base-200 mx-auto relative">
    <div
      id="toast-container"
      class="fixed top-4 right-4 z-50 max-w-sm w-full space-y-2"
    ></div>

    <header
      class="border-b-2 border-gray-300 sticky top-0 bg-base-200/95 backdrop-blur-sm z-10"
    >
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="flex gap-2 items-center">
          <a href="home.html" class="btn btn-ghost btn-sm btn-circle">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
          <div class="logo w-[40px]">
            <img src="assets/logo.png" alt="Payoo Logo" />
          </div>
          <div class="balance-info">
            <h2 class="text-xl font-bold">$<span id="balance">0</span></h2>
            <p class="text-neutral/50 text-xs">Available Balance</p>
          </div>
        </div>
      </section>
    </header>

    <section class="w-11/12 mx-auto py-6">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-hand-holding-heart text-error"></i>
        Donate
      </h2>

      <div class="space-y-4">
        <!-- Donation Causes -->
        <div class="grid grid-cols-2 gap-3">
          <div
            class="card bg-base-100 shadow rounded-xl p-4 text-center cursor-pointer hover:shadow-md transition-all"
          >
            <div class="text-3xl mb-2">🎓</div>
            <h3 class="font-bold text-sm">Education</h3>
          </div>
          <div
            class="card bg-base-100 shadow rounded-xl p-4 text-center cursor-pointer hover:shadow-md transition-all"
          >
            <div class="text-3xl mb-2">🏥</div>
            <h3 class="font-bold text-sm">Healthcare</h3>
          </div>
          <div
            class="card bg-base-100 shadow rounded-xl p-4 text-center cursor-pointer hover:shadow-md transition-all"
          >
            <div class="text-3xl mb-2">🌱</div>
            <h3 class="font-bold text-sm">Environment</h3>
          </div>
          <div
            class="card bg-base-100 shadow rounded-xl p-4 text-center cursor-pointer hover:shadow-md transition-all"
          >
            <div class="text-3xl mb-2">🍽️</div>
            <h3 class="font-bold text-sm">Food Aid</h3>
          </div>
        </div>

        <!-- Donation Form -->
        <div class="card bg-base-100 shadow rounded-2xl">
          <div class="card-body">
            <h3 class="font-bold mb-3">Make a Donation</h3>
            <div class="space-y-3">
              <input
                id="donate-amount"
                type="number"
                class="input rounded-full bg-base-200 w-full no-spinner"
                placeholder="Amount to Donate"
              />
              <button id="donate-btn" class="btn btn-error rounded-full w-full">
                <i class="fa-solid fa-heart"></i> Donate Now
              </button>
            </div>
          </div>
        </div>

        <!-- Recent Donations -->
        <div id="donations-list" class="space-y-2">
          <div class="text-center py-4 text-neutral/50">
            <p>No donations yet</p>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="script/pages/donate.js"></script>
  </body>
</html>
