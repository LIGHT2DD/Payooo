<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Get Bonus</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- tailwind+daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>

  <body class="min-h-screen max-w-md bg-base-200 mx-auto relative">
    <!-- Header -->
    <header
      class="border-b-2 border-gray-300 sticky top-0 bg-base-200/95 backdrop-blur-sm z-10"
    >
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="flex gap-2 items-center">
          <a href="home.html" class="btn btn-ghost btn-sm btn-circle">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
          <div class="logo w-[40px]">
            <img src="assets/logo.png" alt="Payoo Logo" />
          </div>
          <div class="balance-info">
            <h2 class="text-xl font-bold">$<span id="balance">0.00</span></h2>
            <p class="text-neutral/50 text-xs">Available Balance</p>
          </div>
        </div>
      </section>
    </header>

    <section class="w-11/12 mx-auto py-6">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-gift text-primary"></i>
        Get Bonus
      </h2>
      <div class="card bg-base-100 w-full shadow rounded-2xl">
        <div class="card-body">
          <div class="text-center py-8">
            <div class="text-6xl mb-4">🎁</div>
            <h3 class="text-2xl font-bold mb-2">Daily Bonus</h3>
            <p id="bonus-message" class="text-neutral/60 mb-6">
              Claim your daily bonus now and receive $5.00.
            </p>
            <button
              id="claim-bonus-btn"
              class="btn btn-primary rounded-full w-full"
            >
              <i class="fa-solid fa-gift"></i> Claim Bonus
            </button>
            <a href="home.html" class="btn btn-ghost mt-4 w-full">
              <i class="fa-solid fa-arrow-left"></i>
              Back to Dashboard
            </a>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="script/pages/get-bonus.js"></script>
  </body>
</html>
