<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | QR Scanner</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
      #qr-reader {
        border-radius: 1rem;
        overflow: hidden;
      }
    </style>
  </head>

  <body class="min-h-screen max-w-md bg-base-200 mx-auto relative">
    <div
      id="toast-container"
      class="fixed top-4 right-4 z-50 max-w-sm w-full space-y-2"
    ></div>

    <header
      class="border-b-2 border-gray-300 sticky top-0 bg-base-200/95 backdrop-blur-sm z-10"
    >
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="flex gap-2 items-center">
          <a href="home.html" class="btn btn-ghost btn-sm btn-circle">
            <i class="fa-solid fa-arrow-left"></i>
          </a>
          <div class="logo w-[40px]">
            <img src="assets/logo.png" alt="Payoo Logo" />
          </div>
        </div>
      </section>
    </header>

    <section class="w-11/12 mx-auto py-6">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa-solid fa-qrcode text-secondary"></i>
        QR Code Scanner
      </h2>

      <div class="space-y-4">
        <!-- QR Scanner Area -->
        <div class="card bg-base-100 shadow rounded-2xl">
          <div class="card-body text-center">
            <div
              id="qr-reader"
              class="w-full aspect-square bg-base-300 rounded-xl flex items-center justify-center"
            >
              <div class="text-center">
                <i class="fa-solid fa-qrcode text-6xl text-neutral/30 mb-4"></i>
                <p class="text-neutral/50">Camera will appear here</p>
              </div>
            </div>
            <button
              id="start-scan-btn"
              class="btn btn-secondary rounded-full w-full mt-3"
            >
              <i class="fa-solid fa-camera"></i> Start Scanner
            </button>
          </div>
        </div>

        <!-- Scan Result -->
        <div
          id="scan-result"
          class="card bg-base-100 shadow rounded-2xl hidden"
        >
          <div class="card-body">
            <h3 class="font-bold mb-2">Scan Result</h3>
            <p
              id="result-text"
              class="text-sm bg-base-200 p-3 rounded-xl break-all"
            ></p>
          </div>
        </div>

        <!-- Manual Entry -->
        <div class="card bg-base-100 shadow rounded-2xl">
          <div class="card-body">
            <h3 class="font-bold mb-3">Manual Entry</h3>
            <input
              id="qr-text-input"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter QR code text"
            />
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="script/pages/qr-scanner.js"></script>
  </body>
</html>
