<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>
    <script>
      try {
        const savedTheme = localStorage.getItem("payoo_theme");
        if (savedTheme === "dark" || savedTheme === "light") {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }
      } catch (error) {
        console.warn("Theme load failed:", error);
      }
    </script>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- tailwind+daisy  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icons  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }

      .input-error {
        border-color: #ef4444 !important;
        animation: shake 0.3s ease-in-out;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: fade-in 0.3s ease-out;
      }

      /* Button press effect - soft blue */
      .btn:active,
      button:active {
        background-color: rgb(59, 130, 246) !important;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2) !important;
        transform: scale(0.98);
      }

      /* Dark mode text contrast */
      [data-theme="dark"] body,
      [data-theme="dark"] .text-neutral,
      [data-theme="dark"] .text-neutral\/50,
      [data-theme="dark"] .text-neutral\/60,
      [data-theme="dark"] .text-neutral\/70,
      [data-theme="dark"] p {
        color: rgba(255, 255, 255, 0.95) !important;
      }
    </style>
  </head>

  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo w-[200px] mx-auto pt-32">
      <img src="assets/Logo-full.png" alt="Payoo Logo" />
    </div>

    <div class="form pt-10">
      <div
        class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl"
      >
        <div class="card-body">
          <form id="login-form" autocomplete="off">
            <fieldset class="fieldset">
              <label class="label text-neutral font-bold">
                <i class="fa-solid fa-phone"></i>
                Mobile Number
              </label>
              <input
                id="input-number"
                maxlength="11"
                minlength="11"
                type="tel"
                class="input rounded-full bg-base-200 w-full"
                value="01234567890"
                placeholder="Enter your 11 digit Number"
                autocomplete="username"
                required
              />
              <p class="text-xs text-neutral/50 mt-1">
                Enter 11 digit phone number
              </p>

              <br />

              <label class="label text-neutral font-bold">
                <i class="fa-solid fa-lock"></i>
                4 Digit Pin
              </label>
              <input
                id="input-pin"
                type="password"
                maxlength="4"
                class="input rounded-full bg-base-200 w-full"
                placeholder="Enter 4 Digit Pin"
                autocomplete="current-password"
                required
              />
              <p class="text-xs text-neutral/50 mt-1">4 digit numeric PIN</p>

              <div></div>
              <button
                id="login-btn"
                type="submit"
                class="btn btn-primary mt-4 rounded-full"
              >
                Login
              </button>

              <p class="text-xs text-center text-neutral/50 mt-2">
                Demo: 01234567890 / PIN: 1234
              </p>
            </fieldset>
          </form>
        </div>
      </div>
    </div>

    <!-- Load scripts as ES Modules -->
    <script type="module" src="script/login.js"></script>
  </body>
</html>
